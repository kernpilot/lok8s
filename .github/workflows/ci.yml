name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck on all shell scripts
        run: |
          find .lok8s/ operator/hooks/ -name '*.sh' -type f \
            | xargs shellcheck --shell=bash --severity=warning

  yamllint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: '.lok8s/ operator/ .github/'
          config_data: |
            extends: default
            rules:
              line-length:
                max: 200
              truthy:
                check-keys: false
              document-start: disable

  unit-tests:
    name: Bats Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain (b → argsh, yq)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          sudo apt-get update && sudo apt-get install -y gettext-base
          # Supply-chain rule: download the pinned installer, then run it.
          curl -fsSL https://raw.githubusercontent.com/fentas/b/v4.17.2/install.sh -o /tmp/b-install.sh
          B_INSTALL_DIR="${HOME}/.local/bin" bash /tmp/b-install.sh
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          b install
          ./.bin/argsh builtins install   # argsh.so — bats runtime + builtins

      - name: Run unit tests
        run: ./.bin/argsh test tests/unit/

  operator-tests:
    name: Bats Operator Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain (b → argsh, yq)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          sudo apt-get update && sudo apt-get install -y jq gettext-base
          curl -fsSL https://raw.githubusercontent.com/fentas/b/v4.17.2/install.sh -o /tmp/b-install.sh
          B_INSTALL_DIR="${HOME}/.local/bin" bash /tmp/b-install.sh
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          b install
          ./.bin/argsh builtins install   # argsh.so — bats runtime + builtins

      - name: Run operator tests
        run: ./.bin/argsh test tests/operator/

  integration-tests:
    name: Integration Tests (Kind)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [shellcheck, unit-tests, operator-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1.12.0
        with:
          cluster_name: lok8s-test

      - name: Verify cluster
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Apply lok8s CRDs
        run: |
          kubectl apply --server-side -f operator/crds/
          kubectl wait --for=condition=Established crd --all --timeout=60s

      - name: Create and read back a Lo resource
        run: |
          kubectl apply -f - <<'EOF'
          apiVersion: cluster.lok8s.dev/v1beta1
          kind: Lo
          metadata:
            name: ci-smoke
          spec:
            cluster:
              domain: ci.lok8s.dev
            runtime: kind
            bootstrap:
              - cilium
          EOF
          kubectl get lo ci-smoke -o yaml
          test "$(kubectl get lo ci-smoke -o jsonpath='{.spec.cluster.domain}')" = "ci.lok8s.dev"

      - name: Validate CRD schemas reject bad specs
        run: |
          if kubectl apply -f - <<'EOF' 2>/dev/null
          apiVersion: cluster.lok8s.dev/v1beta1
          kind: Lo
          metadata:
            name: ci-bad
          spec: {}
          EOF
          then
            echo "expected schema validation to reject a spec without cluster.domain" >&2
            exit 1
          fi
