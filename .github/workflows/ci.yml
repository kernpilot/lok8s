name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck (pinned — apt's version drifts and SC2120 et al. are version-sensitive)
        env:
          SHELLCHECK_VERSION: v0.11.0
          # sha256 of shellcheck-v0.11.0.linux.x86_64.tar.xz (verified via 3 independent downloads)
          SHELLCHECK_SHA256: 8c3be12b05d5c177a04c29e3c78ce89ac86f1595681cab149b65b97c4e227198
        run: |
          # Supply-chain rule: download the pinned tarball, verify, then extract.
          url="https://github.com/koalaman/shellcheck/releases/download/${SHELLCHECK_VERSION}/shellcheck-${SHELLCHECK_VERSION}.linux.x86_64.tar.xz"
          curl -fsSL "${url}" -o /tmp/shellcheck.tar.xz
          echo "${SHELLCHECK_SHA256}  /tmp/shellcheck.tar.xz" | sha256sum -c -
          tar -xJf /tmp/shellcheck.tar.xz -C /tmp
          sudo install "/tmp/shellcheck-${SHELLCHECK_VERSION}/shellcheck" /usr/local/bin/shellcheck
          shellcheck --version

      - name: Run shellcheck on all shell scripts
        run: |
          # Two passes: *.sh files (sourced libs often have no shebang) AND
          # the extensionless argsh libs/drivers (#!/usr/bin/env argsh), which
          # a `-name '*.sh'` filter alone would silently skip. Overlap is fine.
          find .lok8s operator/hooks -type f -name '*.sh' \
            | xargs shellcheck --shell=bash --severity=warning
          grep -rlE '^#!/usr/bin/env (argsh|bash)' .lok8s operator/hooks \
            | xargs shellcheck --shell=bash --severity=warning

  yamllint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: '.lok8s/ operator/ .github/'
          config_data: |
            extends: default
            rules:
              line-length:
                max: 200
              truthy:
                check-keys: false
              document-start: disable

  unit-tests:
    name: Bats Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain (b → argsh, yq)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          sudo apt-get update && sudo apt-get install -y gettext-base
          # Supply-chain rule: download the pinned installer, then run it.
          curl -fsSL https://raw.githubusercontent.com/fentas/b/v4.17.2/install.sh -o /tmp/b-install.sh
          B_INSTALL_DIR="${HOME}/.local/bin" bash /tmp/b-install.sh
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          b install
          ./.bin/argsh builtins install   # argsh.so — bats runtime + builtins

      - name: Vendored argsh runtime is in sync with the lockfile
        run: |
          # `b install` just rewrote .bin/argsh from b.lock; if that differs
          # from the committed copy, the vendored bootstrap runtime is stale.
          git diff --exit-code -- .bin/argsh \
            || { echo "::error::.bin/argsh drifted from .bin/b.lock — run 'b install' and commit the result"; exit 1; }

      - name: Run unit tests
        run: ./.bin/argsh test tests/unit/

  operator-tests:
    name: Bats Operator Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain (b → argsh, yq)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          sudo apt-get update && sudo apt-get install -y jq gettext-base
          curl -fsSL https://raw.githubusercontent.com/fentas/b/v4.17.2/install.sh -o /tmp/b-install.sh
          B_INSTALL_DIR="${HOME}/.local/bin" bash /tmp/b-install.sh
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          b install
          ./.bin/argsh builtins install   # argsh.so — bats runtime + builtins

      - name: Run operator tests
        run: ./.bin/argsh test tests/operator/

  integration-tests:
    name: Integration Tests (Kind)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [shellcheck, unit-tests, operator-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1.12.0
        with:
          cluster_name: lok8s-test

      - name: Verify cluster
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Apply lok8s CRDs
        run: |
          kubectl apply --server-side -f operator/crds/
          kubectl wait --for=condition=Established crd --all --timeout=60s

      - name: Create and read back a Lo resource
        run: |
          kubectl apply -f - <<'EOF'
          apiVersion: cluster.lok8s.dev/v1beta1
          kind: Lo
          metadata:
            name: ci-smoke
          spec:
            cluster:
              domain: ci.lok8s.dev
            runtime: kind
            bootstrap:
              - cilium
          EOF
          kubectl get lo ci-smoke -o yaml
          test "$(kubectl get lo ci-smoke -o jsonpath='{.spec.cluster.domain}')" = "ci.lok8s.dev"

      - name: Validate CRD schemas reject bad specs
        run: |
          if kubectl apply -f - <<'EOF' 2>/dev/null
          apiVersion: cluster.lok8s.dev/v1beta1
          kind: Lo
          metadata:
            name: ci-bad
          spec: {}
          EOF
          then
            echo "expected schema validation to reject a spec without cluster.domain" >&2
            exit 1
          fi

      - name: All cluster kinds resolve under cluster.lok8s.dev
        run: |
          # Every cluster kind (incl. the regrouped Deploy + new Kkp/KubeOne)
          # must serve under the one group. A 404 here = a group drift.
          for kind in Lo Capi Kkp KubeOne Deploy; do
            kubectl get --raw "/apis/cluster.lok8s.dev/v1beta1" \
              | grep -q "\"kind\":\"${kind}\"" \
              || { echo "kind ${kind} not served under cluster.lok8s.dev" >&2; exit 1; }
          done
          # Round-trip a Deploy (the kind whose group was corrected).
          kubectl apply -f - <<'EOF'
          apiVersion: cluster.lok8s.dev/v1beta1
          kind: Deploy
          metadata:
            name: ci-deploy
          spec:
            clusterRef:
              domain: ci.lok8s.dev
          EOF
          test "$(kubectl get deploys.cluster.lok8s.dev ci-deploy -o jsonpath='{.spec.clusterRef.domain}')" = "ci.lok8s.dev"
