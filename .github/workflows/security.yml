name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  trivy-dockerfile:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy on Dockerfile
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: operator/Dockerfile
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy results to Security tab
        # Code scanning needs GHAS, unavailable on this private repo — tolerate
        # upload failure until the repo goes public (GOLIVE-TODO 6.1).
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-dockerfile

  trivy-image:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build operator image for scanning
        run: |
          docker build -t lok8s-operator:scan -f operator/Dockerfile .

      - name: Run Trivy on built image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: lok8s-operator:scan
          format: sarif
          output: trivy-image-results.sarif

      - name: Upload Trivy image results to Security tab
        # Code scanning needs GHAS, unavailable on this private repo — tolerate
        # upload failure until the repo goes public (GOLIVE-TODO 6.1).
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-image

  shellcheck-sarif:
    name: ShellCheck (SARIF)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck with SARIF output
        run: |
          find .lok8s/ operator/hooks/ -name '*.sh' -type f \
            | xargs shellcheck --shell=bash --severity=warning --format=json \
            | jq '
              {
                "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json",
                version: "2.1.0",
                runs: [{
                  tool: {
                    driver: {
                      name: "ShellCheck",
                      informationUri: "https://www.shellcheck.net/",
                      rules: [
                        .[] | {
                          id: ("SC" + (.code | tostring)),
                          shortDescription: { text: .message },
                          defaultConfiguration: {
                            level: (if .level == "error" then "error"
                                    elif .level == "warning" then "warning"
                                    else "note" end)
                          }
                        }
                      ] | unique_by(.id)
                    }
                  },
                  results: [
                    .[] | {
                      ruleId: ("SC" + (.code | tostring)),
                      level: (if .level == "error" then "error"
                              elif .level == "warning" then "warning"
                              else "note" end),
                      message: { text: .message },
                      locations: [{
                        physicalLocation: {
                          artifactLocation: { uri: .file },
                          region: {
                            startLine: .line,
                            startColumn: .column,
                            endLine: .endLine,
                            endColumn: .endColumn
                          }
                        }
                      }]
                    }
                  ]
                }]
              }' > shellcheck-results.sarif || true

      - name: Upload ShellCheck results to Security tab
        # Code scanning needs GHAS, unavailable on this private repo — tolerate
        # upload failure until the repo goes public (GOLIVE-TODO 6.1).
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: shellcheck-results.sarif
          category: shellcheck
