name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create distributable tarball
        run: |
          VERSION="${GITHUB_REF_NAME}"
          tar -czf "lok8s-${VERSION}.tar.gz" \
            .lok8s/ \
            operator/crds/ \
            operator/deploy/ \
            .kustomize/ \
            --transform "s,^,lok8s-${VERSION}/,"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: lok8s-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
