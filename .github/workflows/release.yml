name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Go for both the kustomize plugins (go 1.25) and the lochat binaries (1.22);
      # the kustomize module needs the higher version, which also builds lochat.
      - uses: actions/setup-go@v5
        with:
          go-version-file: kustomize/go.mod

      - name: Build kustomize plugins
        run: make -C kustomize build   # → .kustomize/<group>/<version>/<kind>/<Kind>

      - name: Create distributable tarball
        run: |
          VERSION="${GITHUB_REF_NAME}"
          # .kustomize/ holds the just-built plugins; include it only if present so
          # a clean checkout never fails the tar on a missing path.
          paths=(.lok8s/ operator/crds/ operator/deploy/)
          if [ -d .kustomize ]; then paths+=(.kustomize/); fi
          tar -czf "lok8s-${VERSION}.tar.gz" "${paths[@]}" \
            --transform "s,^,lok8s-${VERSION}/,"

      - name: Build lo chat (lochat) binaries
        run: |
          # `lo chat` engine — a single static, stdlib-only Go binary. Cross-compile
          # for the common dev platforms so `b` / users can fetch it from the release
          # instead of building from source.
          for platform in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os="${platform%/*}"; arch="${platform#*/}"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -C ai/lochat -trimpath -ldflags="-s -w" \
                -o "${GITHUB_WORKSPACE}/lochat-${os}-${arch}" .
            echo "built lochat-${os}-${arch}"
          done

      - name: Checksums
        run: sha256sum lok8s-*.tar.gz lochat-* | tee SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            lok8s-*.tar.gz
            lochat-*
            SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
