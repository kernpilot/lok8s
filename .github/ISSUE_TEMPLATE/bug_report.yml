name: Bug report
description: Report a problem with the lo CLI, a driver, addon, or the operator
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! **Security issue?** Don't file here — see
        [SECURITY.md](https://github.com/kernpilot/lok8s/blob/main/SECURITY.md).
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you expect, and what actually occurred?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The commands you ran, plus a minimal `cluster.lok8s.yaml` if relevant.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: lok8s version / commit
    validations:
      required: true
  - type: dropdown
    id: driver
    attributes:
      label: Driver
      options:
        - "Lo (kind)"
        - "KubeOne"
        - "Capi"
        - "Kkp"
        - "n/a"
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, kubectl / kustomize / Helm / Tilt versions, Hetzner or local, etc.
