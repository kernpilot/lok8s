# Default lok8s.dev development cluster — slot 125.
#
# This is the canonical "minimal Lo spec" — the framework derives
# everything from the domain (lok8s.dev → slot 125) and
# domain-independent defaults:
#
#   network.name:       "local" (from metadata.name)
#   network.cidr:       "10.125.125.0/24"
#   registries.shared:  enabled, "lok8s-registries" @ 10.125.200.0/24
#   registries.mirrors: io-docker, io-quay, io-k8s, io-ghcr
#   nodes:              CP=1, workers=0
#   nodes.hostPorts:    true  (slot 125 owns 80/443/8080 on the host)
#   loadBalancer.pool:  "10.125.125.125-10.125.125.150"
#   bootstrap:          [cni]
#
# To add metallb support, add `metallb` to spec.bootstrap below. To
# override any other field, declare it explicitly — see
# tests/fixtures/lo-cluster-{shared,no-shared,network}.lok8s.yaml for
# the full shape.
apiVersion: cluster.lok8s.dev/v1beta1
kind: Lo
metadata:
  name: local
spec:
  kubernetes:
    version: "v1.31.4"
  cluster:
    domain: lok8s.dev
  kubehz:
    hosting: self
    access: none
  bootstrap:
    - cilium
    - metallb
