run:
  timeout: 3m
  go: "1.22"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam
    - bodyclose
    - gocyclo
    - dupl
    - prealloc

linters-settings:
  gocyclo:
    min-complexity: 15
  goimports:
    local-prefixes: github.com/kernpilot/lok8s/kustomize

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - dupl
        - gocyclo
        - errcheck
