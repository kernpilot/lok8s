# Minimal *.lok8s.dev cluster spec. The framework derives every other
# field from the slot (128) and domain-independent defaults.
apiVersion: cluster.lok8s.dev/v1beta1
kind: Lo
metadata:
  name: e2e-cache
spec:
  kubernetes:
    version: "v1.31.4"
  cluster:
    domain: 128.lok8s.dev
  # Pin plain HTTP: e2e snapshots the certs.d goldens; the TLS default (true)
  # would rewrite them to https+ca and pull in a generated CA. Off = deterministic.
  registries:
    tls: false
