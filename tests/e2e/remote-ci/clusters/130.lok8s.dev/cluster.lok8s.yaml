# E2E: remote-ci — full remote CI mode. Repo synced to VM,
# lo provision + tilt run entirely on the remote.
apiVersion: cluster.lok8s.dev/v1beta1
kind: Lo
metadata:
  name: e2e-ci
spec:
  kubernetes:
    version: "v1.31.4"
  cluster:
    domain: 130.lok8s.dev
  # Pin plain HTTP: e2e snapshots the certs.d goldens; the TLS default (true)
  # would rewrite them to https+ca and pull in a generated CA. Off = deterministic.
  registries:
    tls: false
  provider:
    name: hetzner
    configRef: hetzner.json
  remote:
    mode: ci
    expose: true
    tilt: false          # skip Tilt in e2e — just verify provision works
