# Test fixture: Kkp kind cluster spec (Hetzner via KKP)
apiVersion: cluster.lok8s.dev/v1beta1
kind: Kkp
metadata:
  name: test-kkp-cluster
spec:
  kubernetes:
    version: "v1.29.2"
  cluster:
    domain: kkp-test.lok8s.dev
    namespace: default
  kkp:
    apiUrl: "https://kkp.test.example.com"
    projectId: "test-project-123"
