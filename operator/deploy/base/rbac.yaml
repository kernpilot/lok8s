apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: lok8s-operator
  labels:
    app.kubernetes.io/name: lok8s-operator
    app.kubernetes.io/part-of: lok8s
rules:
  # lok8s CRDs — full access for reconciliation
  - apiGroups:
      - cluster.lok8s.dev
    resources:
      - los
      - los/status
      - capis
      - capis/status
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - deploy.lok8s.dev
    resources:
      - deploys
      - deploys/status
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  # CAPI core resources — create and manage clusters
  - apiGroups:
      - cluster.x-k8s.io
    resources:
      - clusters
      - clusters/status
      - machines
      - machines/status
      - machinedeployments
      - machinedeployments/status
      - machinesets
      - machinesets/status
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  # CAPI control plane resources
  - apiGroups:
      - controlplane.cluster.x-k8s.io
    resources:
      - kubeadmcontrolplanes
      - kubeadmcontrolplanes/status
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  # CAPI bootstrap resources
  - apiGroups:
      - bootstrap.cluster.x-k8s.io
    resources:
      - kubeadmconfigs
      - kubeadmconfigtemplates
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  # Hetzner CAPI provider resources
  - apiGroups:
      - infrastructure.cluster.x-k8s.io
    resources:
      - hetznerclusters
      - hetznerclusters/status
      - hcloudmachinetemplates
      - hcloudmachines
      - hetznerbaremetalhosts
      - hetznerbaremetalmachines
      - hetznerbaremetalmachinetemplates
      # AWS provider resources (future)
      - awsclusters
      - awsclusters/status
      - awsmachinetemplates
      - awsmachines
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  # Secrets — kubeconfigs and provider credentials
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
  # ConfigMaps — operator configuration
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
  # Events — record operator events
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
  # Namespaces — read for context
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - get
      - list
      - watch
  # CRD management — apply lok8s CRDs on startup
  - apiGroups:
      - apiextensions.k8s.io
    resources:
      - customresourcedefinitions
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
  # Deployments — for target deployment (deploy::apply)
  - apiGroups:
      - apps
    resources:
      - deployments
      - statefulsets
      - daemonsets
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  # Services, ServiceAccounts — for target deployment
  - apiGroups:
      - ""
    resources:
      - services
      - serviceaccounts
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  # RBAC — for target deployment
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - clusterroles
      - clusterrolebindings
      - roles
      - rolebindings
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  # shell-operator leader election
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: lok8s-operator
  labels:
    app.kubernetes.io/name: lok8s-operator
    app.kubernetes.io/part-of: lok8s
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: lok8s-operator
subjects:
  - kind: ServiceAccount
    name: lok8s-operator
    namespace: lok8s-system
