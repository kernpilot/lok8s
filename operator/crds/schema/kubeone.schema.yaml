kind: KubeOne
group: cluster.lok8s.dev
version: v1beta1
plural: kubeones
shortNames:
  - k1
scope: Namespaced
printerColumns:
  - name: Phase
    type: string
    jsonPath: .status.phase
  - name: Ready
    type: boolean
    jsonPath: .status.ready
  - name: Domain
    type: string
    jsonPath: .spec.cluster.domain
  - name: Hosting
    type: string
    jsonPath: .spec.kubehz.hosting
  - name: Age
    type: date
    jsonPath: .metadata.creationTimestamp
spec:
  type: object
  # The KubeOne driver reads provider/credentials/addons fields not
  # enumerated below. Preserve them rather than letting the apiserver
  # silently prune on write (the bash driver stays authoritative).
  x-kubernetes-preserve-unknown-fields: true
  required:
    - cluster
  properties:
    kubernetes:
      type: object
      properties:
        version:
          type: string
          description: Kubernetes version (e.g. "v1.31.10")
    cluster:
      type: object
      required:
        - domain
      properties:
        domain:
          type: string
          description: Cluster FQDN
          # Used in filesystem paths by the driver — reject `/` and `..`.
          pattern: '^[a-z0-9]([a-z0-9.-]*[a-z0-9])?$'
          maxLength: 253
        namespace:
          type: string
          default: default
          description: Default namespace
    kubehz:
      type: object
      description: |
        kubehz platform integration. When present, `lo provision`
        registers the cluster with the platform (see spec.kubehz.hosting).
      properties:
        hosting:
          type: string
          enum:
            - self
            - hosted
          description: |
            self = user runs the whole cluster (dashboard visibility only);
            hosted = kubehz runs the control plane, user runs workers.
        access:
          type: string
          enum:
            - registered
            - managed
          description: Heartbeat-only (registered) vs platform-managed.
        apiUrl:
          type: string
          pattern: "^https://"
          description: kubehz-core API endpoint (e.g. https://api.kubehz.cloud).
    runner:
      type: object
      description: |
        Where the KubeOne provisioning job runs (hosted mode). The driver
        reads only the well-known fields below; provider-specific knobs are
        preserved via the spec-level preserve-unknown-fields.
      properties:
        type:
          type: string
          description: Runner infrastructure type (e.g. hetzner).
        location:
          type: string
          description: Runner location/region (e.g. fsn1).
    bootstrap:
      type: array
      items:
        type: string
      description: |
        Cluster-infrastructure addons applied in order by the driver
        during provisioning, before workloads. Each entry resolves
        against .lok8s/addons/<name>/ (bare name) or a ./ ../ / path.
status:
  type: object
  properties:
    phase:
      type: string
      enum:
        - Pending
        - Provisioning
        - Provisioned
        - Terminating
        - Failed
      description: Current lifecycle phase
    ready:
      type: boolean
      description: Whether the cluster is fully ready
    registered:
      type: boolean
      description: Whether the cluster is registered with the kubehz platform
    kubeconfig:
      type: object
      description: Where the cluster's kubeconfig is published
      properties:
        secretRef:
          type: string
          description: Name of the Secret holding the kubeconfig (key `value`)
    conditions:
      type: array
      items:
        type: object
        required:
          - type
          - status
        properties:
          type:
            type: string
          status:
            type: string
            enum:
              - "True"
              - "False"
              - Unknown
          reason:
            type: string
          message:
            type: string
          lastTransitionTime:
            type: string
            format: date-time
