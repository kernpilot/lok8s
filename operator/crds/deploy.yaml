apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: deploys.deploy.lok8s.dev
spec:
  group: deploy.lok8s.dev
  names:
    kind: Deploy
    listKind: DeployList
    plural: deploys
    singular: deploy
    shortNames:
      - dep
  scope: Namespaced
  versions:
    - name: v1beta1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Cluster
          type: string
          jsonPath: .spec.clusterRef.domain
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - clusterRef
              properties:
                domain:
                  type: string
                  description: Deployment domain FQDN
                clusterRef:
                  type: object
                  required:
                    - domain
                  properties:
                    domain:
                      type: string
                      description: Cluster domain to deploy to
                namespace:
                  type: string
                  description: Target namespace on the cluster
                # NOTE: workload selection for Deploy specs is being
                # reworked post-refactor (the old spec.syncWave field was
                # removed). Target selection will land alongside the
                # services.yaml targets-map design.
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Deploying
                    - Deployed
                    - Failed
                  description: Current deployment phase
                targets:
                  type: object
                  additionalProperties:
                    type: string
                  description: Per-target deployment status
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - status
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
