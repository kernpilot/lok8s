# examples/kkp — a user cluster via an existing Kubermatic (KKP).
#
# The `Kkp` driver does NOT run a control plane itself: it calls an existing KKP
# installation's API to create a user cluster (KKP owns etcd/apiserver/scheduler;
# Hetzner provides the worker nodes). So this example needs a reachable KKP plus
# its project + datacenter — fill the placeholders below before running.
apiVersion: cluster.lok8s.dev/v1beta1
kind: Kkp
metadata:
  name: kkp-example
spec:
  kubernetes:
    version: "v1.31.12"
  cluster:
    domain: kkp-example.lok8s.dev
    namespace: default
  kkp:
    apiUrl: "https://kkp.kubehz.in.net"   # your KKP endpoint
    projectId: "<your-kkp-project-id>"    # from the KKP dashboard / API
    datacenter: "hetzner-fsn1"
  provider:
    name: hetzner
    config: {}
    credentials:
      envVars:
        - KKP_TOKEN        # KKP API token (service-account or personal)
        - HCLOUD_TOKEN     # Hetzner token for the worker nodes
  workers:
    pool-1:
      replicas: 1
      flavor: cpx21
      operatingSystem: ubuntu
  bootstrap:
    - cilium
    - ccm
