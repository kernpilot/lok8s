# hcloud CCM credentials — the single source for EVERY driver (CAPI, KubeOne,
# and any future one). Each driver's provider exports the creds into the env
# before this addon renders; the generator reads them:
#   token          — HCLOUD_TOKEN, required (a missing token is a hard error —
#                    you can't generate a valid hcloud API token).
#   robot-user     — HROBOT_USER, OPTIONAL → the key is omitted entirely on
#   robot-password — HROBOT_PASSWORD, OPTIONAL  clusters with no bare-metal
#                    (Robot) worker, so the addon renders cleanly everywhere.
# Override directly anytime:
#   lo secrets set --name hcloud --namespace kube-system token <TOKEN>
apiVersion: secrets.lok8s.dev/v1
kind: Secret
metadata:
  name: hcloud
  namespace: kube-system
type: Opaque
env:
  token: HCLOUD_TOKEN
  robot-user: { var: HROBOT_USER, optional: true }
  robot-password: { var: HROBOT_PASSWORD, optional: true }
  # private-network name for CCM networking mode (CAPI's CAPH names it after the
  # cluster) — optional, omitted unless a driver exports it. KubeOne passes the
  # network via the chart's HCLOUD_NETWORK env instead, so it leaves this unset.
  network: { var: HCLOUD_CCM_NETWORK, optional: true }
