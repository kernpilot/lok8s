# Hetzner cloud-controller-manager values.
#
# The CCM reads its creds from the `hcloud` secret (key `token`, + optional
# robot-*/network) — generated by THIS addon's Secret.hcloud.kube-system.yaml
# from the env each driver's provider loads (one source for every driver).
# Networking off by default (cilium owns pod routing via an overlay); the
# KubeOne driver flips routes/robot via per-cluster inline values. Metrics off
# (no Prometheus in the base).
networking:
  enabled: false
monitoring:
  enabled: false
