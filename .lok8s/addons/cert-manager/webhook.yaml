# Hetzner DNS-01 ACME webhook for cert-manager (solverName: hetzner). Bundled
# with cert-manager because the webhook is useless without it and kubehz always
# issues via Hetzner DNS-01. The ClusterIssuer (solverName: hetzner) + the
# hetzner-dns token Secret are cluster GLUE (per-domain), not part of this addon.
apiVersion: khelm.mgoltzsche.github.com/v2
kind: ChartRenderer
metadata:
  name: cert-manager-webhook-hetzner
  namespace: cert-manager
kubeVersion: "1.31.12"
repository: https://charts.hetzner.cloud
chart: cert-manager-webhook-hetzner
version: 0.7.0
