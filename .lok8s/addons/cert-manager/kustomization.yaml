# cert-manager — framework addon.
#
# A generic, reusable atom: bootstrap `cert-manager` by name to get the
# cert-manager controller + CRDs (jetstack v1.20.1) in the cert-manager
# namespace. That alone satisfies the ClusterIssuer/Certificate CRDs that KKP
# and the networking target's CRs reference.
#
# The Hetzner DNS-01 ACME webhook is now a SEPARATE opt-in addon
# (`cert-manager-webhook-hetzner`) — only clusters that issue via Hetzner DNS-01
# (prod) bootstrap it, AFTER this one; dev/kind clusters serving a `cert:` Secret
# skip it.
#
# CLUSTER GLUE stays behind (NOT in this addon): the ClusterIssuer
# (letsencrypt-prod, solverName: hetzner) and the hetzner-dns API-token Secret —
# those are per-domain (ACME account, token) and live in the cluster's
# networking target. Bootstrap `cert-manager` BEFORE the target that ships the
# ClusterIssuer/Certificate CRs (their CRDs come from here).
#
# lok8s.dev labels are metadata-only (includeSelectors: false): the chart
# Deployments carry immutable selectors.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

labels:
  - includeSelectors: false
    pairs:
      lok8s.dev/name: cert-manager
      lok8s.dev/type: system
      lok8s.dev/category: infrastructure

namespace: cert-manager

generators:
  - chart.yaml

resources:
  - namespace.yaml
