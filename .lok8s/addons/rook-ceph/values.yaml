# Rook-Ceph operator (Helm) values — operator only.
crds:
  enabled: true

# CSI: RBD only for Phase 1. Enable CephFS later if RWX/shared storage is needed.
# Rook 1.19.6 deploys the ceph-csi driver (ctrlplugin/nodeplugin) and registers
# rook-ceph.rbd.csi.ceph.com reliably — verified end-to-end (PVC Bound + RBD r/w).
csi:
  enableRbdDriver: true
  enableCephfsDriver: false
  enableNFSDriver: false
  # Only the worker is schedulable (CPs are tainted NoSchedule), so a 2nd
  # provisioner replica would sit Pending on anti-affinity. One until the CP
  # tier lands (Phase 2), then bump back to 2 for provisioner HA.
  provisionerReplicas: 1

# We pin devices via per-node deviceFilter in cluster.yaml — no discovery daemon.
enableDiscoveryDaemon: false

logLevel: INFO

resources:
  limits:
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi
