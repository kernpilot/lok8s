# khelm chart spec for the Rook-Ceph OPERATOR (controller + CRDs) only.
# The CephCluster / CephBlockPool / StorageClass are raw CRs in this target
# (cluster.yaml, pool-worker.yaml) — not the rook-ceph-cluster chart — so we
# keep precise control over the multi-tier topology (per-node deviceFilter,
# CRUSH device-class separation, mon placement, etcd-protective throttles).
apiVersion: khelm.mgoltzsche.github.com/v2
kind: ChartRenderer
metadata:
  name: rook-ceph
  namespace: rook-ceph
kubeVersion: "1.35.5"
repository: https://charts.rook.io/release
# Rook v1.20.1 + latest Ceph — the Ceph image is set in the cluster's CephCluster
# CR (not here); keep the operator and Ceph image moving in step. Bare-metal OSD
# gotcha: the single-disk ceph-osd carve yields a ~1KiB partition (installimage
# fills the disk) — use a dedicated disk instead. See docs/guide/bare-metal.md.
chart: rook-ceph
version: v1.20.1
valueFiles:
  - values.yaml
