# CAPI MachineDeployment resource template (per worker pool)
# Rendered by capi::generate() with envsubst from cluster.lok8s.yaml spec
# Variables set per pool: ${POOL_NAME}, ${POOL_REPLICAS}, ${POOL_TYPE}
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineDeployment
metadata:
  name: ${CLUSTER_NAME}-${POOL_NAME}
  namespace: ${CLUSTER_NAMESPACE}
  labels:
    lok8s.dev/managed: "true"
    lok8s.dev/domain: ${CLUSTER_DOMAIN}
spec:
  clusterName: ${CLUSTER_NAME}
  replicas: ${POOL_REPLICAS}
  selector:
    matchLabels: null
  template:
    spec:
      clusterName: ${CLUSTER_NAME}
      version: ${K8S_VERSION}
      bootstrap:
        configRef:
          apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
          kind: KubeadmConfigTemplate
          name: ${CLUSTER_NAME}-${POOL_NAME}
      infrastructureRef:
        apiVersion: ${INFRA_API_VERSION}
        kind: ${INFRA_MACHINE_TEMPLATE_KIND}
        name: ${CLUSTER_NAME}-${POOL_NAME}
