# HetznerCluster (infrastructure.cluster.x-k8s.io/v1beta1).
# Rendered by capi::generate() when provider=hetzner. Modelled on CAPH v1.1.7:
# hcloud-only (no private network), the control-plane endpoint is the hcloud
# load balancer on :443, and the hcloud token is read from the lok8s credential
# Secret (created by capi::ensure_credentials in the same namespace).
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: HetznerCluster
metadata:
  name: ${CLUSTER_NAME}
  namespace: ${CLUSTER_NAMESPACE}
  labels:
    lok8s.dev/managed: "true"
    lok8s.dev/domain: ${CLUSTER_DOMAIN}
spec:
  hcloudNetwork:
    enabled: false
  controlPlaneRegions:
    - ${HCLOUD_REGION}
  controlPlaneEndpoint:
    host: ""
    port: 443
  controlPlaneLoadBalancer:
    region: ${HCLOUD_REGION}
  sshKeys:
    hcloud:
      - name: ${HCLOUD_SSH_KEY_NAME}
  hetznerSecretRef:
    name: ${CREDENTIAL_SECRET_NAME}
    key:
      hcloudToken: hcloud-token
      hetznerRobotUser: robot-user
      hetznerRobotPassword: robot-password
