# Hetzner infrastructure cluster template
# Rendered by capi::generate() when provider=hetzner
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: HetznerCluster
metadata:
  name: ${CLUSTER_NAME}
  namespace: ${CLUSTER_NAMESPACE}
  labels:
    lok8s.dev/managed: "true"
    lok8s.dev/domain: ${CLUSTER_DOMAIN}
spec:
  controlPlaneRegions:
    - ${HCLOUD_REGION}
  controlPlaneEndpoint:
    host: ""
    port: 6443
  controlPlaneLoadBalancer:
    enabled: true
    region: ${HCLOUD_REGION}
  sshKeys:
    hcloud:
      - name: ${HCLOUD_SSH_KEY_NAME}
    hrobot: []
  hcloudPlacementGroup: []
  hetznerSecretRef:
    name: ${CREDENTIAL_SECRET_NAME}
    key:
      hcloudToken: hcloud-token
      hetznerRobotUser: robot-user
      hetznerRobotPassword: robot-password
