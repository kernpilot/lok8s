# Local cache registry — pre-pull target for build:false services with a
# configured registry. lo image cache fetches the upstream image using the
# host's docker credentials, retags into here, and pushes. Kind nodes pull
# from here without needing upstream credentials.
# Lives at offset .102 inside the project's /24 slot subnet
# (e.g. 10.125.125.102 for the default cluster slot 125).
# Hostname (containerd mirror): lok8s.cache
version: 0.1
log:
  fields:
    service: registry
storage:
  cache:
    blobdescriptor: inmemory
  filesystem:
    rootdirectory: /var/lib/registry
http:
  addr: :80
  headers:
    X-Content-Type-Options: [nosniff]
delete:
  enabled: true
health:
  storagedriver:
    enabled: true
    interval: 10s
    threshold: 3
