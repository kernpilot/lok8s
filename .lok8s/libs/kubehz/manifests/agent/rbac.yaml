apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubehz-agent
  labels:
    app.kubernetes.io/name: kubehz-agent
    app.kubernetes.io/part-of: kubehz
rules:
  - apiGroups:
      - ""
    resources:
      - nodes
      - componentstatuses
      - namespaces
    verbs:
      - get
      - list
  - apiGroups:
      - certificates.k8s.io
    resources:
      - certificatesigningrequests
    verbs:
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubehz-agent
  labels:
    app.kubernetes.io/name: kubehz-agent
    app.kubernetes.io/part-of: kubehz
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubehz-agent
subjects:
  - kind: ServiceAccount
    name: kubehz-agent
    namespace: kubehz-system
