apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubehz-managed
  labels:
    app.kubernetes.io/name: kubehz-operator
    app.kubernetes.io/part-of: kubehz
rules:
  - apiGroups:
      - apps
    resources:
      - deployments
      - statefulsets
      - daemonsets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - pods
      - pods/log
      - services
      - configmaps
      - events
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - cluster.x-k8s.io
    resources:
      - machinedeployments
    verbs:
      - get
      - list
      - watch
      - update
      - patch
  - apiGroups:
      - ""
    resources:
      - nodes
    verbs:
      - get
      - list
      - watch
      - update
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubehz-managed
  labels:
    app.kubernetes.io/name: kubehz-operator
    app.kubernetes.io/part-of: kubehz
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubehz-managed
subjects:
  - kind: ServiceAccount
    name: kubehz-agent
    namespace: kubehz-system
